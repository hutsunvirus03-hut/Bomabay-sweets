<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bombay Sweets | Bulk Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --brand-purple: #4B237B; --brand-yellow: #FFCC00; }
        .bg-purple { background-color: var(--brand-purple) !important; }
        .text-purple { color: var(--brand-purple) !important; }
        .bg-yellow { background-color: var(--brand-yellow) !important; }
        .text-yellow { color: var(--brand-yellow) !important; }
        .btn-purple { background-color: var(--brand-purple); color: var(--brand-yellow); font-weight: bold; }
        .btn-purple:hover { background-color: #361859; color: #fff; }
    </style>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-purple navbar-dark sticky-top border-bottom border-warning border-3">
        <div class="container">
             <img src="c:\Users\Hutsun\Downloads\converted-image.svg" alt="" width="150" height="60">
            <a class="navbar-brand fw-bold text-yellow fs-3" href="index.html">Bombay Sweets</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fs-5">
                    <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="shop.html">Shopping</a></li>
                    <li class="nav-item"><a class="nav-link text-yellow active fw-bold" href="bulk.html">Bulk Orders</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="about.html">About Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Bulk Form Section -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow">
                    <div class="card-header bg-purple text-yellow text-center py-4">
                        <h2 class="fw-bold mb-0">Catering & Bulk Orders</h2>
                        <p class="mb-0 small text-white-50">Planning an event? Let us sweeten it up!</p>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <form>
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-purple">Full Name</label>
                                    <input type="text" class="form-control" placeholder="John Doe" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-purple">Email Address</label>
                                    <input type="email" class="form-control" placeholder="john@example.com" required>
                                </div>
                            </div>
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-purple">Estimated Weight Needed</label>
                                    <select class="form-select">
                                        <option>25kg</option>
                                        <option>50kg</option>
                                        <option>100kg(Mega Event)</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-purple">Event Date</label>
                                    <input type="date" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold text-purple">Specific Sweets or Custom Notes</label>
                                <textarea class="form-control" rows="4" placeholder="Tell us about your custom packaging preferences or sweet choices..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-purple btn-lg w-100">Submit Inquiry Request</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-purple text-yellow text-center py-4 mt-5 border-top border-warning border-3">
        <div class="container"><p class="mb-0">&copy; © 2026 Bombay Sweets. All Rights Reserved. Crafted with Tradition.</p></div>
    </footer>
</body>
</html>
